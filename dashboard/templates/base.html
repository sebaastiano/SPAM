<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SPAM! Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>

<!-- Top navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-rocket-takeoff-fill text-warning me-2"></i>SPAM!
    </a>

    <!-- Game state badges -->
    <div class="d-flex align-items-center me-auto ms-3 gap-2" id="game-badges">
      <span class="badge bg-secondary" id="badge-phase">Phase: —</span>
      <span class="badge bg-secondary" id="badge-turn">Turn: —</span>
      <span class="badge bg-secondary" id="badge-balance">Balance: —</span>
    </div>

    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'overview' %}active{% endif %}" href="/">
          <i class="bi bi-grid-1x2-fill me-1"></i>Overview
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'bids' %}active{% endif %}" href="/bids">
          <i class="bi bi-hammer me-1"></i>Bids
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'market' %}active{% endif %}" href="/market">
          <i class="bi bi-shop me-1"></i>Market
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'competitors' %}active{% endif %}" href="/competitors">
          <i class="bi bi-people-fill me-1"></i>Competitors
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active_page == 'messages' %}active{% endif %}" href="/messages">
          <i class="bi bi-chat-dots-fill me-1"></i>Messages
        </a>
      </li>
    </ul>

    <div class="ms-3">
      <span class="badge rounded-pill" id="tracker-status">
        <i class="bi bi-circle-fill me-1"></i>Tracker
      </span>
    </div>
  </div>
</nav>

<!-- Main content -->
<main class="container-fluid py-3">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="text-center text-muted small py-2 border-top border-secondary">
  SPAM! Strategic Dashboard &mdash; Team 17 &mdash; Data from tracker @ localhost:5555
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/common.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
