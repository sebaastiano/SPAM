{% extends "base.html" %}
{% set active_page = "messages" %}
{% block title %}SPAM! — Message Intelligence{% endblock %}

{% block content %}
<div class="row g-3 mb-3">
  <div class="col-md-4">
    <div class="card bg-dark border-info h-100">
      <div class="card-body text-center">
        <div class="text-muted small">Total Messages</div>
        <div class="h4 fw-bold text-info" id="msg-count">—</div>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card bg-dark border-warning h-100">
      <div class="card-body text-center">
        <div class="text-muted small">Unique Senders</div>
        <div class="h4 fw-bold text-warning" id="msg-senders">—</div>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card bg-dark border-success h-100">
      <div class="card-body text-center">
        <div class="text-muted small">Directed at Us</div>
        <div class="h4 fw-bold text-success" id="msg-us">—</div>
      </div>
    </div>
  </div>
</div>

<div class="row g-3">
  <div class="col-12">
    <div class="card bg-dark border-secondary">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-chat-dots-fill text-info me-2"></i>Message Feed</span>
        <div>
          <input type="text" class="form-control form-control-sm bg-dark text-light border-secondary"
                 id="msg-filter" placeholder="Filter messages…" style="width: 200px;">
        </div>
      </div>
      <div class="card-body p-0">
        <div id="message-feed" style="max-height: 600px; overflow-y: auto; padding: 1rem;">
          <div class="text-muted">Loading messages…</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/messages.js') }}"></script>
{% endblock %}
